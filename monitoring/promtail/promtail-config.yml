server:
  http_listen_port: 9080
  log_level: warn

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: rag-app-file
    static_configs:
      - targets: [localhost]
        labels:
          container: rag-server
          job: rag-app-file
          __path__: /var/log/rag-app/app.log*
    pipeline_stages:
      - match:
          selector: '{container="rag-server"} |~ "rag\\.query: \\{"'
          stages:
            - regex:
                expression: 'rag\.query: (?P<json>\{.*\})'
            - json:
                source: json
                expressions:
                  event:
                  mode:
                  experiment_id:
                  base_tag:
            - labels:
                event:
                mode:
                experiment_id:
                base_tag:

  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: container
      - source_labels: ['__meta_docker_container_log_stream']
        target_label: stream
      - source_labels: ['__meta_docker_container_label_com_docker_compose_service']
        target_label: service
    pipeline_stages:
      - docker: {}
      - match:
          selector: '{container="rag-server"}'
          stages:
            - regex:
                expression: '\[INFO\] rag\.query: (?P<json>\{.*\})'
            - output:
                source: json
            - json:
                expressions:
                  event:
                  mode:
                  experiment_id:
                  base_tag:
            - labels:
                event:
                mode:
                experiment_id:
                base_tag:
