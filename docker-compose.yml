services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: always

  mongodb:
    image: mongo:7
    container_name: mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      - MONGO_INITDB_DATABASE=rag
    restart: always

  rag-server:
    build:
      context: .
      args:
        CUDA_VARIANT: ${CUDA_VARIANT:-cu118}
    container_name: rag-server
    depends_on:
      - qdrant
      - mongodb
    volumes:
      - .:/app
      - ./DOKUMENTY:/app/DOKUMENTY
    ports:
      - "8000:8000"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    environment:
      - PYTHONUNBUFFERED=1
      - QDRANT_HOST=qdrant
      - MONGODB_HOST=mongodb
    stdin_open: true
    tty: true

volumes:
  qdrant_data:
    name: rag_qdrant_data
  mongodb_data:
    name: rag_mongodb_data
