name: rag

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: always

  mongodb:
    image: mongo:7
    container_name: mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      - MONGO_INITDB_DATABASE=rag
    restart: always

  rag-server:
    build:
      context: .
      args:
        CUDA_VARIANT: ${CUDA_VARIANT:-cu118}
    container_name: rag-server
    depends_on:
      - qdrant
      - mongodb
    volumes:
      - .:/app
      - ./DOKUMENTY:/app/DOKUMENTY
      - ./logs:/app/logs
    ports:
      - "8000:8000"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    environment:
      - PYTHONUNBUFFERED=1
      - QDRANT_HOST=qdrant
      - MONGODB_HOST=mongodb
      - BASE_TAG=${BASE_TAG:-default}
      - MODEL_NAME=${MODEL_NAME:-intfloat/multilingual-e5-base}
      - EMBEDDING_DIM=${EMBEDDING_DIM:-768}
      - EXPERIMENT_ID=${EXPERIMENT_ID:-}
      - PARENT_MAX_SIZE=${PARENT_MAX_SIZE:-2000}
      - PARENT_SOFT_SIZE=${PARENT_SOFT_SIZE:-1500}
      - PARENT_COMBINE_UNDER=${PARENT_COMBINE_UNDER:-800}
      - PARENT_OVERLAP=${PARENT_OVERLAP:-0}
      - CHILD_CHUNK_SIZE=${CHILD_CHUNK_SIZE:-400}
      - CHILD_CHUNK_OVERLAP=${CHILD_CHUNK_OVERLAP:-80}
      - DEFAULT_K=${DEFAULT_K:-3}
      - QDRANT_UPSERT_BATCH_SIZE=${QDRANT_UPSERT_BATCH_SIZE:-256}
      - RETRIEVAL_MODE=${RETRIEVAL_MODE:-hybrid}
      - HYBRID_DENSE_WEIGHT=${HYBRID_DENSE_WEIGHT:-1.0}
      - HYBRID_SPARSE_WEIGHT=${HYBRID_SPARSE_WEIGHT:-1.0}
      - HYBRID_RRF_K=${HYBRID_RRF_K:-60}
      - SPARSE_MODEL_NAME=${SPARSE_MODEL_NAME:-Qdrant/bm25}
      - EXTRACTION_STRATEGY=${EXTRACTION_STRATEGY:-fast}
      - EXTRACTION_LANGUAGES=${EXTRACTION_LANGUAGES:-pol,eng}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - LOG_DIR=${LOG_DIR:-/app/logs}
    stdin_open: true
    tty: true

  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    command:
      - --path.procfs=/host/proc
      - --path.sysfs=/host/sys
      - --collector.disable-defaults
      - --collector.cpu
      - --collector.meminfo
      - --collector.diskstats
      - --collector.loadavg
      - --collector.pressure
      - --collector.vmstat
      - --collector.stat
      - --collector.filefd
      - --collector.uname
      - --collector.os
      - --collector.hwmon
      - --collector.hwmon.chip-include=.*(coretemp|nvme).*
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
    ports:
      - "9100:9100"
    restart: always

  mongodb-exporter:
    image: percona/mongodb_exporter:0.40
    container_name: mongodb-exporter
    command:
      - --mongodb.uri=mongodb://mongodb:27017
      - --collect-all
      - --compatible-mode
    depends_on:
      - mongodb
    ports:
      - "9216:9216"
    restart: always

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.52.1
    container_name: cadvisor
    privileged: true
    devices:
      - /dev/kmsg
    command:
      - --docker_only=true
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
      - /dev/disk:/dev/disk:ro
    ports:
      - "8080:8080"
    restart: always

  dcgm-exporter:
    image: nvcr.io/nvidia/k8s/dcgm-exporter:3.3.7-3.5.0-ubuntu22.04
    container_name: dcgm-exporter
    cap_add:
      - SYS_ADMIN
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu, utility]
    ports:
      - "9400:9400"
    restart: always

  loki:
    image: grafana/loki:3.4.1
    container_name: loki
    command: -config.file=/etc/loki/loki-config.yml
    volumes:
      - ./monitoring/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki_data:/loki
    ports:
      - "3100:3100"
    restart: always

  promtail:
    image: grafana/promtail:3.4.1
    container_name: promtail
    command: -config.file=/etc/promtail/promtail-config.yml
    depends_on:
      - loki
    volumes:
      - ./monitoring/promtail/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: always

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    depends_on:
      - prometheus
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"
    restart: always

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=60d
      - --web.enable-lifecycle
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    restart: always

volumes:
  qdrant_data:
    name: rag_qdrant_data
  mongodb_data:
    name: rag_mongodb_data
  prometheus_data:
    name: rag_prometheus_data
  grafana_data:
    name: rag_grafana_data
  loki_data:
    name: rag_loki_data
