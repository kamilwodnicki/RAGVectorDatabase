name: rag

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: always

  mongodb:
    image: mongo:7
    container_name: mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      - MONGO_INITDB_DATABASE=rag
    restart: always

  rag-server:
    build:
      context: .
      args:
        CUDA_VARIANT: ${CUDA_VARIANT:-cu118}
    container_name: rag-server
    depends_on:
      - qdrant
      - mongodb
    volumes:
      - .:/app
      - ./DOKUMENTY:/app/DOKUMENTY
      - ./METADATA:/app/METADATA
      - ./logs:/app/logs
    ports:
      - "8000:8000"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    environment:
      - PYTHONUNBUFFERED=1
      - QDRANT_HOST=qdrant
      - MONGODB_HOST=mongodb
      - PARENT_MAX_SIZE=${PARENT_MAX_SIZE:-2000}
      - PARENT_SOFT_SIZE=${PARENT_SOFT_SIZE:-1500}
      - PARENT_COMBINE_UNDER=${PARENT_COMBINE_UNDER:-800}
      - PARENT_OVERLAP=${PARENT_OVERLAP:-0}
      - CHILD_CHUNK_SIZE=${CHILD_CHUNK_SIZE:-400}
      - CHILD_CHUNK_OVERLAP=${CHILD_CHUNK_OVERLAP:-80}
      - DEFAULT_K=${DEFAULT_K:-3}
      - QDRANT_UPSERT_BATCH_SIZE=${QDRANT_UPSERT_BATCH_SIZE:-256}
      - RETRIEVAL_MODE=${RETRIEVAL_MODE:-hybrid}
      - HYBRID_DENSE_WEIGHT=${HYBRID_DENSE_WEIGHT:-1.0}
      - HYBRID_SPARSE_WEIGHT=${HYBRID_SPARSE_WEIGHT:-1.0}
      - HYBRID_RRF_K=${HYBRID_RRF_K:-60}
      - SPARSE_MODEL_NAME=${SPARSE_MODEL_NAME:-Qdrant/bm25}
      - EXTRACTION_STRATEGY=${EXTRACTION_STRATEGY:-fast}
      - EXTRACTION_LANGUAGES=${EXTRACTION_LANGUAGES:-pol,eng}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - LOG_DIR=${LOG_DIR:-/app/logs}
    stdin_open: true
    tty: true

  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    command:
      - --path.procfs=/host/proc
      - --path.sysfs=/host/sys
      - --collector.disable-defaults
      - --collector.cpu
      - --collector.meminfo
      - --collector.diskstats
      - --collector.loadavg
      - --collector.pressure
      - --collector.vmstat
      - --collector.stat
      - --collector.filefd
      - --collector.uname
      - --collector.os
      - --collector.hwmon
      - --collector.hwmon.chip-include=.*(coretemp|nvme).*
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
    ports:
      - "9100:9100"
    restart: always

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=60d
      - --web.enable-lifecycle
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    restart: always

volumes:
  qdrant_data:
    name: rag_qdrant_data
  mongodb_data:
    name: rag_mongodb_data
  prometheus_data:
    name: rag_prometheus_data
