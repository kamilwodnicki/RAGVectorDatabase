[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -ra --strict-markers
markers =
    unit: fast tests, no external services
    integration: tests requiring Qdrant / MongoDB containers
    eval: retrieval-quality evaluation runs against a golden set
filterwarnings =
    ignore::DeprecationWarning:pydantic.*
    ignore::DeprecationWarning:langchain.*
